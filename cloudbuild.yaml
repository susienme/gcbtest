substitutions:
  _OUTPUT_BUCKET: 'gcb_test'
  _TRIGGER_TOPIC: 'hit_the_gas'
  _PROJECT_ID: 'mhyun-test-project2'
  _OUTPUT_IMAGE_SUFFIX: ''
  _OUTPUT_IMAGE_FAMILY: ''
  _FLOW_ID: '45e24297-31ac-4058-951a-07e8337cc7ab'

steps:
  # --- Step 1: Generate timestamp, SHA files, and local output file ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -xeuo pipefail

        # 1. Get current timestamp
        TIMESTAMP=$$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        # 4. Read the contents of input.txt
        INPUT_CONTENT=$$(cat input.txt)

        # 5. Create the formatted local output file
        OUTPUT_FILE="${SHORT_SHA}-output.txt"
        echo "$${TIMESTAMP} ${SHORT_SHA} $${INPUT_CONTENT}" > "$${OUTPUT_FILE}"

        echo "Successfully generated $${OUTPUT_FILE} with content:"
        cat "$${OUTPUT_FILE}"
        echo ${COMMIT_SHA}

  # --- Step 2: Publish Pub/Sub Trigger Message ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -xeuo pipefail

        PR_EMAIL=$(git log -1 --format='%ae' 2>/dev/null || true)
        if [[ "$${PR_EMAIL}" != *@google.com ]]; then
          PR_EMAIL="noreply@google.com"
        fi

        echo "Publishing Pub/Sub message to topic ${_TRIGGER_TOPIC} using Flow ID ${_FLOW_ID}..."
        cat << MSG_EOF > /workspace/pubsub_msg.json
        {
          "flow": "${_FLOW_ID}",
          "userParameters": {
            "_OVERWRITE_REF_SHA": "${SHORT_SHA}",
            "_HEAD_BRANCH": "$_HEAD_BRANCH",
            "_BASE_BRANCH": "$_BASE_BRANCH",
            "_HEAD_REPO_URL": "$_HEAD_REPO_URL",
            "_PR_NUMBER": "$_PR_NUMBER",
            "_ASDF": "QWERTY",
            "_SLEEP": "2",
            "_PR_EMAIL": "$${PR_EMAIL}"
          },
          "gitParameters": {
            "commitSha": "${COMMIT_SHA}"
          }
        }
        MSG_EOF

        echo "Previewing payload Content:"
        cat /workspace/pubsub_msg.json

        echo "Publishing Pub/Sub message to topic ${_TRIGGER_TOPIC} using Flow ID ${_FLOW_ID}..."
        gcloud pubsub topics publish "projects/${_PROJECT_ID}/topics/${_TRIGGER_TOPIC}" \
          --message="$(cat /workspace/pubsub_msg.json)"
# Automatically upload any matching output file to the GCS bucket
artifacts:
  objects:
    location: 'gs://${_OUTPUT_BUCKET}/'
    paths:
      - '*-output.txt'

# Required when using a custom Service Account
options:
  logging: CLOUD_LOGGING_ONLY
