#        gcloud pubsub topics publish "projects/${_PROJECT_ID}/topics/${_TRIGGER_TOPIC}" \
#            --message="{\"flow\": \"$${RAW_SHA}\", \"parameters\": {\"_OVERWRITE_REF_SHA\": \"$${SHORT_HASH}\"}, \"gitParameters\": {\"commitSha\": \"$${SHORT_HASH}\"}}"

# Automatically upload any matching output file to the GCS bucket
artifacts:
  objects:
    location: 'gs://${_OUTPUT_BUCKET}/'
    paths:
      - '*-output.txt'

# Required when using a custom Service Account
options:
  logging: CLOUD_LOGGING_ONLY
